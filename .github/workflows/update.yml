name: Update tonnel.png

on:
  schedule:
    - cron: '13,43 * * * *'
  workflow_dispatch:

jobs:
  update_thumbs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run JS
        run: node update.js
        env:
          API: ${{ secrets.API }}

      - name: Commit Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "action@github.com"
          git add tonnel.png
          git commit -m "Update tonnel.png"
          git pull --rebase
          git push
